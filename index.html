<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }
  .bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, #1a0533 0%, #0a0a0f 60%),
                radial-gradient(ellipse at 80% 20%, #001a33 0%, transparent 50%);
    z-index: 0;
  }
  .stars { position: fixed; inset: 0; z-index: 0; }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
  }
  .main-screen {
    position: relative; z-index: 10;
    text-align: center;
    display: flex; flex-direction: column;
    align-items: center; gap: 50px;
  }
  .title {
    font-family: 'Bungee', cursive;
    font-size: 4.5rem;
    color: #fff;
    text-shadow: 0 0 30px #a855f7, 0 0 60px #7c3aed;
    letter-spacing: 4px;
    animation: pulse-glow 2s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 30px #a855f7, 0 0 60px #7c3aed; }
    50% { text-shadow: 0 0 60px #c084fc, 0 0 120px #a855f7, 0 0 20px #fff; }
  }
  .subtitle {
    color: #a78bfa;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 8px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 10px;
  }
  .btn-container { position: relative; }
  .glow-ring {
    position: absolute; inset: -15px;
    border-radius: 50px;
    background: conic-gradient(from 0deg, #7c3aed, #a855f7, #ec4899, #7c3aed);
    animation: spin 3s linear infinite;
    filter: blur(8px);
    opacity: 0.7;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .btn {
    position: relative;
    padding: 22px 65px;
    font-family: 'Bungee', cursive;
    font-size: 1.5rem;
    letter-spacing: 3px;
    color: #fff;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    border: 2px solid #a855f7;
    border-radius: 40px;
    cursor: pointer;
    transition: transform 0.1s, background 0.3s;
    box-shadow: 0 10px 40px rgba(124, 58, 237, 0.5);
    z-index: 1;
  }
  .btn:hover { background: linear-gradient(135deg, #9333ea, #6366f1); transform: scale(1.05); }
  .btn:active { transform: scale(0.97); }

  /* VIDEO OVERLAY - TAM EKRAN */
  .video-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    z-index: 9999;
  }
  .video-overlay.show { display: block; }
  .video-overlay video {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
  }
  .close-hint {
    position: absolute; bottom: 20px; right: 20px;
    color: rgba(255,255,255,0.3);
    font-size: 0.8rem;
    z-index: 10000;
    font-family: 'Nunito', sans-serif;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="stars" id="stars"></div>

<div class="main-screen">
  <div>
    <div class="title">OYUN</div>
    <div class="subtitle">Efsane Macera Başlıyor</div>
  </div>
  <div class="btn-container">
    <div class="glow-ring"></div>
    <button class="btn" onclick="startGame()">▶ OYUNU BAŞLAT</button>
  </div>
</div>

<script>
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 2 + 's';
    s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    starsEl.appendChild(s);
  }

  function startGame() {
    const overlay = document.getElementById('videoOverlay');
    const video = document.getElementById('gameVideo');
    overlay.classList.add('show');
    video.currentTime = 0;
    video.play();
  }

  document.getElementById('videoOverlay').addEventListener('click', function() {
    this.classList.remove('show');
    document.getElementById('gameVideo').pause();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.getElementById('videoOverlay').classList.remove('show');
      document.getElementById('gameVideo').pause();
    }
  });
</script>
